<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>教学工作台 | Bright English</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./teacher.css" />
  </head>
  <body>
    <header class="teacher-topbar">
      <a class="teacher-brand" href="./index.html" aria-label="返回网站首页">
        <span class="brand-mark">B</span>
        <span><strong>Bright English</strong><small>教学工作台</small></span>
      </a>
      <nav class="teacher-nav" aria-label="工作台导航">
        <a href="#schedule">课程</a>
        <a href="#students">学生</a>
        <a href="#tasks">待办</a>
      </nav>
      <div class="topbar-actions">
        <a class="button" href="./index.html">网站首页</a>
        <button class="button" id="logoutButton" type="button">退出登录</button>
      </div>
    </header>

    <main class="teacher-shell">
      <section class="workspace-heading">
        <div>
          <h1>教学工作台</h1>
          <p class="workspace-date" id="workspaceDate"></p>
        </div>
        <div class="workspace-actions">
          <button class="button" id="exportData" type="button">导出备份</button>
          <button class="button" id="importData" type="button">导入备份</button>
          <input class="hidden" id="importFile" type="file" accept="application/json" />
          <button class="button primary" id="copyBookingEmail" type="button">复制预约邮箱</button>
        </div>
      </section>

      <section class="dashboard-grid" aria-label="数据概览">
        <article class="metric"><span>今日课程</span><strong id="todayCourseCount">0</strong></article>
        <article class="metric"><span>在读学生</span><strong id="activeStudentCount">0</strong></article>
        <article class="metric"><span>未完成待办</span><strong id="openTaskCount">0</strong></article>
      </section>

      <div class="quick-tools" aria-label="快捷新增">
        <button class="button primary" type="button" data-open-dialog="courseDialog">添加课程</button>
        <button class="button" type="button" data-open-dialog="studentDialog">添加学生</button>
        <button class="button" type="button" data-open-dialog="taskDialog">添加待办</button>
      </div>

      <section class="workspace-panel" id="schedule">
        <div class="panel-heading"><h2>课程安排</h2><span id="courseTotal"></span></div>
        <div class="data-list" id="courseList"></div>
      </section>

      <section class="workspace-panel" id="students">
        <div class="panel-heading"><h2>学生档案</h2><span id="studentTotal"></span></div>
        <div class="data-list" id="studentList"></div>
      </section>

      <section class="workspace-panel" id="tasks">
        <div class="panel-heading"><h2>教学待办</h2><span id="taskTotal"></span></div>
        <div class="data-list" id="taskList"></div>
      </section>
    </main>

    <dialog class="editor-dialog" id="courseDialog">
      <form class="editor-form" id="courseForm" method="dialog">
        <div class="dialog-heading"><h2>课程</h2><button class="dialog-close" type="button" data-close-dialog aria-label="关闭">×</button></div>
        <input id="courseId" type="hidden" />
        <div class="form-grid">
          <label>日期<input id="courseDate" type="date" required /></label>
          <label>时间<input id="courseTime" type="time" required /></label>
          <label>学生<input id="courseStudent" type="text" maxlength="30" required /></label>
          <label>学段<select id="courseLevel"><option>小学</option><option>初中</option><option>高中</option></select></label>
          <label class="full">课程内容<input id="courseTopic" type="text" maxlength="80" required /></label>
          <label>状态<select id="courseStatus"><option value="scheduled">待上课</option><option value="completed">已完成</option><option value="cancelled">已取消</option></select></label>
        </div>
        <div class="dialog-actions"><button class="button" type="button" data-close-dialog>取消</button><button class="button primary" type="submit">保存</button></div>
      </form>
    </dialog>

    <dialog class="editor-dialog" id="studentDialog">
      <form class="editor-form" id="studentForm" method="dialog">
        <div class="dialog-heading"><h2>学生</h2><button class="dialog-close" type="button" data-close-dialog aria-label="关闭">×</button></div>
        <input id="studentId" type="hidden" />
        <div class="form-grid">
          <label>学生姓名<input id="studentName" type="text" maxlength="30" required /></label>
          <label>学段<select id="studentGrade"><option>小学</option><option>初中</option><option>高中</option></select></label>
          <label>微信号<input id="studentWechat" type="text" maxlength="50" /></label>
          <label>状态<select id="studentStatus"><option value="new">待联系</option><option value="active">在读</option><option value="paused">暂停</option></select></label>
          <label class="full">学习目标<textarea id="studentGoal" maxlength="200"></textarea></label>
        </div>
        <div class="dialog-actions"><button class="button" type="button" data-close-dialog>取消</button><button class="button primary" type="submit">保存</button></div>
      </form>
    </dialog>

    <dialog class="editor-dialog" id="taskDialog">
      <form class="editor-form" id="taskForm" method="dialog">
        <div class="dialog-heading"><h2>待办</h2><button class="dialog-close" type="button" data-close-dialog aria-label="关闭">×</button></div>
        <input id="taskId" type="hidden" />
        <div class="form-grid">
          <label class="full">待办事项<input id="taskTitle" type="text" maxlength="100" required /></label>
          <label>截止日期<input id="taskDueDate" type="date" /></label>
          <label>类型<select id="taskType"><option>备课</option><option>课后反馈</option><option>家长沟通</option><option>其他</option></select></label>
        </div>
        <div class="dialog-actions"><button class="button" type="button" data-close-dialog>取消</button><button class="button primary" type="submit">保存</button></div>
      </form>
    </dialog>

    <div class="toast hidden" id="toast" role="status"></div>
    <script src="./auth.js"></script>
    <script src="./teacher.js"></script>
  </body>
</html>
