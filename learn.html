<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="小学、初中和高中英语单词、知识主题、即时练习与个人复习。" />
    <meta property="og:title" content="英语学习馆 | Bright English" />
    <meta property="og:description" content="覆盖小学、初中和高中的英语单词与知识主题，把知识学成自己的语言。" />
    <meta property="og:image" content="https://jiawenfan851-tech.github.io/english-teaching-site/assets/og-learning.jpg" />
    <meta property="og:url" content="https://jiawenfan851-tech.github.io/english-teaching-site/learn.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://jiawenfan851-tech.github.io/english-teaching-site/learn.html" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>英语学习馆 | Bright English Studio</title>
    <link rel="stylesheet" href="./learn.css" />
  </head>
  <body>
    <header class="study-header">
      <a class="study-brand" href="./index.html" aria-label="返回 Bright English 首页">
        <span class="brand-mark">B</span>
        <span><strong>Bright English</strong><small>英语学习馆</small></span>
      </a>
      <nav class="view-tabs" aria-label="学习馆导航">
        <button class="view-tab active" type="button" data-view="vocabulary">词汇</button>
        <button class="view-tab" type="button" data-view="grammar">知识</button>
        <button class="view-tab" type="button" data-view="review">我的复习</button>
      </nav>
      <div class="header-links">
        <a href="./student.html">学生中心</a>
        <a href="./index.html">返回首页</a>
      </div>
    </header>

    <main>
      <nav class="stage-switcher" aria-label="选择学习阶段">
        <button type="button" data-stage="primary">小学</button>
        <button class="active" type="button" data-stage="middle">初中</button>
        <button type="button" data-stage="high">高中</button>
        <button type="button" data-stage="postgraduate">考研</button>
        <button type="button" data-stage="ielts">雅思</button>
      </nav>

      <section class="study-intro">
        <div>
          <p class="eyebrow" id="stageEyebrow">MIDDLE SCHOOL</p>
          <h1 id="stageHeading">初中英语知识库</h1>
          <p id="stageDescription">系统梳理核心词汇与语法，在搜索、练习和复习中逐步掌握。</p>
        </div>
        <dl class="intro-stats" id="introStats" aria-label="学习内容概览">
          <div><dt id="vocabTotal">0</dt><dd id="vocabLabel">阶段单词</dd></div>
          <div><dt id="grammarTotal">0</dt><dd id="grammarLabel">知识主题</dd></div>
          <div><dt id="masteredTotal">0</dt><dd>已经掌握</dd></div>
        </dl>
      </section>

      <section class="today-strip" aria-labelledby="todayTitle">
        <div>
          <span class="today-date" id="todayDate"></span>
          <h2 id="todayTitle">今日一小步</h2>
          <p id="todayMessage">认识 10 个词，再读懂 1 个语法主题。</p>
        </div>
        <div class="today-progress" aria-label="今日学习进度">
          <div><span id="todayProgressBar"></span></div>
          <strong id="todayProgressText">0 / 11</strong>
        </div>
        <button class="primary-command" type="button" id="startToday">开始今日学习</button>
      </section>

      <section class="study-view active" id="vocabularyView" data-panel="vocabulary" aria-labelledby="vocabTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">VOCABULARY</p>
            <h2 id="vocabTitle">义务教育课标词汇</h2>
          </div>
          <button class="secondary-command" type="button" id="startVocabQuiz">开始 10 词小测</button>
        </div>

        <div class="word-controls">
          <div class="filter-tabs" id="wordFilters" role="group" aria-label="词汇范围">
            <button class="filter-tab active" type="button" data-word-filter="all">课标三级 1600 词</button>
            <button class="filter-tab" type="button" data-word-filter="saved">已收藏</button>
          </div>
          <label class="word-search">
            <span>搜索</span>
            <input id="wordSearch" type="search" placeholder="如：journey / 旅行" autocomplete="off" />
          </label>
        </div>

        <div class="result-line">
          <p id="wordResultCount" aria-live="polite"></p>
          <p id="levelLegend">《义务教育英语课程标准（2022年版）》三级词汇</p>
        </div>
        <div class="word-grid" id="wordGrid"></div>
        <button class="load-more hidden" type="button" id="loadMoreWords">继续浏览</button>
      </section>

      <section class="study-view" id="grammarView" data-panel="grammar" aria-labelledby="grammarTitle" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">KNOWLEDGE</p>
            <h2 id="grammarTitle">初中知识库</h2>
          </div>
          <div class="completion"><strong id="grammarDoneCount">0</strong><span>已读懂</span></div>
        </div>

        <div class="grammar-filters" id="grammarFilters" role="group" aria-label="知识范围">
          <button class="grammar-filter active" type="button" data-grammar-filter="all">全部主题</button>
          <button class="grammar-filter" type="button" data-grammar-filter="grade7">七年级</button>
          <button class="grammar-filter" type="button" data-grammar-filter="grade8">八年级</button>
          <button class="grammar-filter" type="button" data-grammar-filter="grade9">九年级</button>
        </div>

        <div class="grammar-workspace">
          <aside class="grammar-index" aria-label="知识主题列表">
            <div id="grammarList"></div>
          </aside>
          <article class="grammar-lesson" id="grammarLesson" aria-live="polite"></article>
        </div>
      </section>

      <section class="study-view" id="reviewView" data-panel="review" aria-labelledby="reviewTitle" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">MY REVIEW</p>
            <h2 id="reviewTitle">我的复习</h2>
          </div>
          <button class="secondary-command" type="button" id="reviewQuiz">复习不会的词</button>
        </div>
        <div class="review-summary">
          <div><strong id="knownCount">0</strong><span>已掌握词汇</span></div>
          <div><strong id="reviewCount">0</strong><span>待复习词汇</span></div>
          <div><strong id="savedCount">0</strong><span>收藏词汇</span></div>
          <div><strong id="grammarCount">0</strong><span>完成知识主题</span></div>
        </div>
        <div class="review-section">
          <div class="review-title-row"><h3>待复习词汇</h3><span id="reviewHint"></span></div>
          <div class="word-grid" id="reviewWordGrid"></div>
        </div>
      </section>

      <section class="source-note" aria-label="内容来源说明">
        <a href="./THIRD_PARTY_NOTICES.md" target="_blank">数据来源与版权</a>
      </section>
    </main>

    <div class="quiz-modal hidden" id="quizModal" aria-hidden="true">
      <button class="quiz-backdrop" type="button" data-close-quiz aria-label="关闭小测"></button>
      <section class="quiz-dialog" role="dialog" aria-modal="true" aria-labelledby="quizTitle">
        <div class="quiz-topline">
          <div><span id="quizStep">1 / 10</span><h2 id="quizTitle">词汇小测</h2></div>
          <button class="close-quiz" type="button" data-close-quiz aria-label="关闭">×</button>
        </div>
        <div class="quiz-progress"><span id="quizProgress"></span></div>
        <p class="quiz-prompt" id="quizPrompt"></p>
        <div class="quiz-options" id="quizOptions"></div>
        <p class="quiz-feedback" id="quizFeedback" aria-live="polite"></p>
        <button class="primary-command quiz-next hidden" type="button" id="quizNext">下一题</button>
      </section>
    </div>

    <script src="./data/grammar.js"></script>
    <script src="./data/stage-content.js"></script>
    <script src="./data/curriculum-vocabulary.js?v=20260711"></script>
    <script src="./data/exam-vocabulary.js?v=20260711"></script>
    <script src="./learn.js?v=20260711"></script>
  </body>
</html>
