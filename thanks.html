<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预约试听 | Bright English Studio</title>
  <style>
    :root { --ink:#172033; --muted:#637083; --paper:#fbfaf6; --teal:#0f766e; --line:#e7e0d5; }
    * { box-sizing: border-box; }
    body { margin:0; color:var(--ink); background:var(--paper); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif; }
    main { width:min(720px,calc(100% - 36px)); margin:0 auto; padding:44px 0; }
    form { display:grid; gap:16px; margin-top:22px; padding:28px; border:1px solid var(--line); border-radius:16px; background:#fff; box-shadow:0 18px 55px rgba(23,32,51,.12); }
    label { display:grid; gap:7px; font-weight:700; }
    input, select, textarea { min-height:46px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; }
    textarea { min-height:100px; resize:vertical; }
    button, a.btn { min-height:44px; border:0; border-radius:10px; padding:0 18px; color:#fff; background:var(--teal); font-weight:800; text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    p { color:var(--muted); line-height:1.75; }
    .status { min-height:24px; margin:0; color:#0b4f4a; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <a href="./">← 返回首页</a>
    <h1>预约一节试听课</h1>
    <p>为了避免部分浏览器跳转到第三方表单错误页，这个备用页面会直接生成一封预约邮件。填写后点击提交，再在邮件应用里点击发送即可。</p>
    <form id="contactForm">
      <label>学生姓名<input id="studentName" required /></label>
      <label>学生学段<select id="studentGrade" required><option>小学</option><option>初中</option><option>高中</option></select></label>
      <label>学习目标<textarea id="goal" required placeholder="例如：校内同步、阅读提升、中高考冲刺"></textarea></label>
      <label>微信号<input id="wechat" required /></label>
      <p id="status" class="status"></p>
      <button type="submit">生成预约邮件</button>
    </form>
  </main>
  <script>
    const form = document.querySelector('#contactForm');
    const statusEl = document.querySelector('#status');
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      const to = 'jiawenfan851' + '@' + 'gmail.com';
      const subject = '新的英语课程预约';
      const body = [
        '学生姓名：' + document.querySelector('#studentName').value.trim(),
        '学生学段：' + document.querySelector('#studentGrade').value,
        '学习目标：' + document.querySelector('#goal').value.trim(),
        '微信号：' + document.querySelector('#wechat').value.trim(),
        '提交页面：' + location.href,
        '提交时间：' + new Date().toLocaleString('zh-CN')
      ].join('\n');
      location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
      statusEl.textContent = '已打开邮件应用，请在邮件里点击发送。';
    });
  </script>
</body>
</html>
