<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>预约已提交 | Bright English Studio</title>
    <style>
      :root { --ink:#172033; --muted:#637083; --paper:#fbfaf6; --teal:#0f766e; --line:#e7e0d5; --white:#fff; }
      * { box-sizing:border-box; }
      body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; color:var(--ink); background:var(--paper); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif; }
      main { width:min(640px,100%); padding:46px; border:1px solid var(--line); border-radius:8px; background:var(--white); box-shadow:0 18px 55px rgba(23,32,51,.12); }
      .mark { width:52px; height:52px; display:grid; place-items:center; border-radius:50%; color:var(--white); background:var(--teal); font-size:25px; font-weight:800; }
      h1 { margin:22px 0 12px; font-size:36px; line-height:1.2; }
      p { margin:0; color:var(--muted); line-height:1.8; }
      .actions { margin-top:28px; display:flex; flex-wrap:wrap; gap:12px; }
      a { min-height:44px; padding:0 18px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--teal); border-radius:6px; color:var(--white); background:var(--teal); font-weight:800; text-decoration:none; }
      a.secondary { color:var(--teal); background:transparent; }
      small { display:block; margin-top:22px; color:var(--muted); line-height:1.7; }
      small a { min-height:0; padding:0; display:inline; border:0; color:var(--teal); background:transparent; font-weight:700; text-decoration:underline; }
      @media (max-width:560px) { main { padding:30px 22px; } h1 { font-size:30px; } .actions a { width:100%; } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">✓</div>
      <h1>预约信息已提交</h1>
      <p>谢谢你的信任。姓名、年级、学习目标和微信号已经交给老师，老师查看邮件后会尽快通过微信联系你。</p>
      <div class="actions">
        <a href="./index.html">返回首页</a>
        <a class="secondary" href="./learn.html">逛逛英语学习馆</a>
      </div>
      <small>若长时间没有收到联系，也可以<a href="mailto:jiawenfan851@gmail.com?subject=英语课程预约咨询">直接给老师发邮件</a>。</small>
    </main>
  </body>
</html>
