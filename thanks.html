      body { min-height:100vh; display:grid; place-items:center; margin:0; padding:24px; color:var(--ink); background:var(--paper); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif; }
      main { width:min(620px,100%); padding:34px; border:1px solid var(--line); border-radius:8px; background:#fff; box-shadow:0 18px 55px rgba(23,32,51,.12); }
      p { color:var(--muted); line-height:1.75; }
      a { display:inline-flex; min-height:44px; align-items:center; justify-content:center; margin-top:10px; padding:0 18px; border-radius:8px; color:#fff; background:var(--teal); font-weight:800; text-decoration:none; }
    </style>
  </head>
