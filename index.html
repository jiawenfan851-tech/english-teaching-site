<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright English Studio</title>
  <style>
    :root { --ink:#172033; --muted:#637083; --paper:#fbfaf6; --teal:#0f766e; --line:#e7e0d5; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:var(--paper); }
    header { padding:28px clamp(18px,5vw,64px); display:flex; justify-content:space-between; gap:20px; align-items:center; border-bottom:1px solid var(--line); background:#fffdf8; position:sticky; top:0; }
    nav { display:flex; gap:18px; flex-wrap:wrap; font-weight:700; }
    a { color:inherit; text-decoration:none; }
    main { width:min(1080px, calc(100% - 36px)); margin:auto; }
    .hero { padding:80px 0; }
    h1 { font-size: clamp(40px, 6vw, 72px); line-height:1.05; margin:0 0 20px; }
    h2 { font-size: clamp(28px, 4vw, 42px); margin:0 0 18px; }
    p { line-height:1.8; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .card, form { background:white; border:1px solid var(--line); border-radius:22px; padding:26px; box-shadow:0 18px 55px rgba(23,32,51,.12); }
    form { display:grid; gap:15px; }
    label { display:grid; gap:7px; font-weight:700; }
    input, select, textarea { min-height:46px; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font:inherit; }
    textarea { min-height:86px; resize:vertical; }
    button, .btn { min-height:46px; border:0; border-radius:12px; padding:0 18px; background:var(--teal); color:white; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    .status { min-height:24px; margin:0; font-weight:700; }
    footer { padding:32px clamp(18px,5vw,64px); border-top:1px solid var(--line); color:var(--muted); margin-top:60px; }
    @media (max-width:760px) { header { align-items:flex-start; flex-direction:column; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <strong>Bright English Studio</strong>
    <nav>
      <a href="#courses">课程</a>
      <a href="#contact">预约</a>
      <a href="teacher.html">老师管理</a>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>让英语学习，成为清澈而有光的成长。</h1>
      <p>面向中小学生的英语成长课程，从词汇、语法、阅读到写作表达，循序渐进地建立语言能力。</p>
      <a class="btn" href="#contact">预约试听</a>
    </section>
    <section id="courses">
      <h2>课程方向</h2>
      <div class="grid">
        <article class="card"><h3>小学</h3><p>自然拼读、兴趣启蒙、基础表达。</p></article>
        <article class="card"><h3>初中</h3><p>词汇语法、阅读理解、写作训练。</p></article>
        <article class="card"><h3>高中</h3><p>阅读深度、写作结构、考试策略。</p></article>
      </div>
    </section>
    <section id="contact" style="padding-top:80px;">
      <h2>预约一节试听课</h2>
      <p>请填写信息。点击提交后会自动打开邮件应用，并生成一封预约邮件；发送后老师即可收到。</p>
      <form id="contactForm">
        <label>学生姓名<input id="studentName" required></label>
        <label>学生学段<select id="studentGrade" required><option>小学</option><option>初中</option><option>高中</option></select></label>
        <label>学习目标<textarea id="goal" required placeholder="例如：校内同步、阅读提升、中高考冲刺"></textarea></label>
        <label>微信号<input id="wechat" required></label>
        <p class="status" id="status"></p>
        <button type="submit">提交预约</button>
      </form>
    </section>
  </main>
  <footer>Bright English Studio</footer>
  <script>
    const form = document.querySelector('#contactForm');
    const statusEl = document.querySelector('#status');
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      const user = 'jiawenfan851';
      const domain = 'gmail.com';
      const to = user + '@' + domain;
      const name = document.querySelector('#studentName').value.trim();
      const grade = document.querySelector('#studentGrade').value;
      const goal = document.querySelector('#goal').value.trim();
      const wechat = document.querySelector('#wechat').value.trim();
      const subject = '新的英语课程预约';
      const body = [
        '学生姓名：' + name,
        '学生学段：' + grade,
        '学习目标：' + goal,
        '微信号：' + wechat,
        '提交页面：' + location.href,
        '提交时间：' + new Date().toLocaleString('zh-CN')
      ].join('\n');
      location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
      statusEl.textContent = '已打开邮件应用，请在邮件里点击发送。';
    });
  </script>
</body>
</html>
